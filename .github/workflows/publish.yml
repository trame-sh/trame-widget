name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build

      # Upgrade npm to 11.5.1+ for OIDC trusted publishing support
      - run: npm install -g npm@latest

      # Uses OIDC trusted publishing — no NPM_TOKEN secret needed.
      # Configure trusted publisher at npmjs.com after the first manual publish.
      - run: npm publish --access public
